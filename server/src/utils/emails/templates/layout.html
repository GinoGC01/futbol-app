<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{subject}}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #E0E0E0;
            -webkit-font-smoothing: antialiased;
        }
        
        .wrapper {
            width: 100%;
            table-layout: fixed;
            background-color: #050505;
            padding-bottom: 40px;
        }
        
        .main {
            background-color: #050505;
            margin: 0 auto;
            width: 100%;
            max-width: 600px;
            border-spacing: 0;
            font-family: 'Inter', sans-serif;
            color: #E0E0E0;
        }
        
        .header {
            padding: 40px 0;
            text-align: center;
        }
        
        .logo {
            height: 45px;
            width: auto;
        }
        
        .card {
            background-color: #0F0F0F;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }
        
        .accent-bar {
            height: 4px;
            width: 100%;
        }
        
        .accent-primary { background: linear-gradient(90deg, #CEDE0B, #8E9908); }
        .accent-warning { background: linear-gradient(90deg, #F59E0B, #B45309); }
        .accent-danger { background: linear-gradient(90deg, #EF4444, #991B1B); }
        
        .content {
            padding: 60px 40px;
            text-align: center;
        }
        
        .title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 56px;
            line-height: 0.9;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-style: italic;
        }
        
        .title-primary { color: #CEDE0B; }
        .title-warning { color: #F59E0B; }
        .title-danger { color: #EF4444; }
        
        .divider {
            width: 60px;
            height: 3px;
            margin: 0 auto 32px;
            border-radius: 2px;
        }
        
        .divider-primary { background-color: #CEDE0B; }
        .divider-warning { background-color: #F59E0B; }
        .divider-danger { background-color: #EF4444; }
        
        .message {
            font-size: 17px;
            line-height: 1.6;
            margin-bottom: 45px;
            color: #A0A0A0;
            font-weight: 400;
        }
        
        .message strong {
            color: #FFFFFF;
            font-weight: 600;
        }
        
        .cta-container {
            margin-bottom: 35px;
        }
        
        .cta-button {
            display: inline-block;
            padding: 22px 50px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            border-radius: 4px;
            transition: transform 0.2s ease;
        }
        
        .cta-primary { background-color: #CEDE0B; color: #000000 !important; }
        .cta-warning { background-color: #F59E0B; color: #000000 !important; }
        .cta-danger { background-color: #EF4444; color: #FFFFFF !important; }
        
        .footer-note {
            font-size: 12px;
            color: #555555;
            max-width: 420px;
            margin: 40px auto 0;
            line-height: 1.6;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .footer {
            margin-top: 50px;
            text-align: center;
            font-size: 11px;
            color: #444444;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 600;
        }
        
        .legal {
            margin-top: 15px;
            color: #333333;
            font-size: 9px;
            letter-spacing: 1px;
        }

        @media only screen and (max-width: 600px) {
            .content { padding: 45px 25px; }
            .title { font-size: 44px; }
            .cta-button { width: 100%; box-sizing: border-box; padding: 20px 20px; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <table class="main" role="presentation">
            <tr>
                <td class="header">
                    <img src="{{logoUrl}}" alt="CANCHA LIBRE" class="logo">
                </td>
            </tr>
            <tr>
                <td>
                    <div class="card">
                        <div class="accent-bar accent-{{variant}}"></div>
                        <div class="content">
                            <div class="title title-{{variant}}">{{title}}</div>
                            <div class="divider divider-{{variant}}"></div>
                            
                            <div class="message">
                                {{body}}
                            </div>
                            
                            {{#if ctaLink}}
                            <div class="cta-container">
                                <a href="{{ctaLink}}" class="cta-button cta-{{variant}}">{{ctaText}}</a>
                            </div>
                            {{/if}}
                            
                            {{#if footerNote}}
                            <div class="footer-note">
                                {{footerNote}}
                            </div>
                            {{/if}}
                        </div>
                    </div>
                </td>
            </tr>
            <tr>
                <td class="footer">
                    © {{year}} CANCHA LIBRE
                    <div class="legal">ELITE TOURNAMENT MANAGEMENT SYSTEM</div>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
